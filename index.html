<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 意大利自驾之旅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 520px;
    width: 100%;
  }
  h1 {
    color: #fff;
    font-size: 28px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: rgba(255,255,255,0.5);
    text-align: center;
    font-size: 13px;
    margin-bottom: 36px;
    letter-spacing: 4px;
  }
  .card {
    display: block;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 16px;
    text-decoration: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }
  .card.day1::before { background: linear-gradient(180deg, #ff6b6b, #ee5a24); }
  .card.day2::before { background: linear-gradient(180deg, #ffd93d, #ff9800); }
  .card.day3::before { background: linear-gradient(180deg, #6bcb77, #2d6a4f); }
  .day-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card.day1 .day-label { color: #ff6b6b; }
  .card.day2 .day-label { color: #ffd93d; }
  .card.day3 .day-label { color: #6bcb77; }
  .card-title {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-desc {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    line-height: 1.6;
  }
  .arrow {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 22px;
    transition: all 0.3s;
  }
  .card:hover .arrow {
    color: rgba(255,255,255,0.6);
    right: 20px;
  }
  .footer {
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    margin-top: 30px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🇮🇹 意大利自驾之旅</h1>
  <p class="subtitle">R O M A  ·  P I S A</p>

  <a class="card day1" href="day1.html">
    <div class="day-label">Day 1</div>
    <div class="card-title">罗马初印象</div>
    <div class="card-desc">斗兽场 → 古罗马广场 → 特莱维喷泉 → 西班牙广场</div>
    <span class="arrow">→</span>
  </a>

  <a class="card day2" href="day2.html">
    <div class="day-label">Day 2</div>
    <div class="card-title">梵蒂冈 + 罗马老城</div>
    <div class="card-desc">圣彼得大教堂 → 梵蒂冈花园 → 博物馆 → 万神殿 → 纳沃纳广场</div>
    <span class="arrow">→</span>
  </a>

  <a class="card day3" href="day3.html">
    <div class="day-label">Day 3</div>
    <div class="card-title">罗马 → 比萨</div>
    <div class="card-desc">自驾前往比萨 → 奇迹广场 → 比萨斜塔 → 托斯卡纳风光</div>
    <span class="arrow">→</span>
  </a>

  <p class="footer">Made with ❤️ for an epic Italian road trip</p>
</div>
</body>
</html>
