<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意大利 10 天行李清单</title>
<style>
  :root {
    --bg: #fafaf7;
    --card: #fff;
    --border: #e8e4dd;
    --text: #2a2a2a;
    --muted: #8a8680;
    --accent: #c2410c;
    --accent-soft: #fff4e6;
    --p3: #dc2626;
    --p2: #d97706;
    --p1: #6b7280;
    --checked: #9ca3af;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 16px;
    line-height: 1.6;
    font-size: 15px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    text-align: center;
  }
  .sub {
    text-align: center;
    color: var(--muted);
    margin-bottom: 16px;
    font-size: 13px;
  }
  .progress-bar {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 10px 0;
    z-index: 10;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .progress-track {
    height: 8px;
    background: #e8e4dd;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f59e0b, #c2410c);
    width: 0%;
    transition: width 0.3s;
  }
  .progress-text {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
  }
  .section {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    padding: 12px 16px;
    background: var(--accent-soft);
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-count {
    font-size: 12px;
    color: var(--muted);
    font-weight: normal;
  }
  .item {
    display: flex;
    align-items: flex-start;
    padding: 10px 16px;
    border-bottom: 1px solid #f4f1ec;
    cursor: pointer;
    user-select: none;
  }
  .item:last-child { border-bottom: none; }
  .item input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-right: 12px;
    margin-top: 2px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .item-body { flex: 1; }
  .item-name {
    font-weight: 500;
  }
  .item-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .item.checked .item-name,
  .item.checked .item-meta {
    text-decoration: line-through;
    color: var(--checked);
  }
  .pri {
    display: inline-block;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
    color: #fff;
  }
  .p3 { background: var(--p3); }
  .p2 { background: var(--p2); }
  .p1 { background: var(--p1); }
  .qty {
    display: inline-block;
    font-size: 12px;
    padding: 1px 6px;
    border-radius: 4px;
    background: #f4f1ec;
    color: #6b7280;
    margin-left: 6px;
  }
  .warn {
    background: #fef3c7;
    border-left: 3px solid #f59e0b;
    padding: 8px 12px;
    margin: 8px 16px 12px;
    border-radius: 6px;
    font-size: 13px;
  }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .btn {
    flex: 1;
    padding: 8px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
  }
  .btn:active { background: #f4f1ec; }
</style>
</head>
<body>

  </div>

  <div class="toolbar">

  <div class="footer">

    数据自动保存在本机浏览器<br>
    _整理：老六 · 2026-04-20_
  </div>
</div>

    ]
  },
  {

    items: [
      {n:"牙刷",q:"每人1把",m:"",p:3},
      {n:"牙膏",q:"1-2支",m:"≤100ml 随身",p:3},

    ]
  },
  {
    title: "⑧ 药品（欧洲药店买药流程复杂）",
    items: [

      {n:"停车币（1€/2€硬币）",q:"20€",m:"小镇老式停车表",p:2},

    items: [
      {n:"护照（全部）",q:"4本",m:"不能托运",p:3},
      {n:"驾照翻译件",q:"4份",m:"",p:3},
      {n:"信用卡+少量现金",q:"",m:"",p:3},

    ]

const list = document.getElementById('list');
const STORAGE_KEY = 'italy_pack_v1';
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

let total = 0;
data.forEach((sec, si) => {
  const secEl = document.createElement('div');
  secEl.className = 'section';
  const secTitle = document.createElement('div');
  secTitle.className = 'section-title';
  secTitle.innerHTML = `<span>${sec.title}</span><span class="section-count" id="sc-${si}"></span>`;
  secEl.appendChild(secTitle);
  sec.items.forEach((it, ii) => {
    const id = `${si}-${ii}`;
    total++;
    const d = document.createElement('label');
    d.className = 'item';
    d.dataset.id = id;
    const checked = saved[id] ? 'checked' : '';
    if (saved[id]) d.classList.add('checked');
    const pLabel = it.p===3?'必带':it.p===2?'建议':'可选';
    d.innerHTML = `
      <input type="checkbox" ${checked} onchange="toggle('${id}', this)">
      <div class="item-body">
        <div class="item-name">${it.n}<span class="pri p${it.p}">${pLabel}</span>${it.q?`<span class="qty">${it.q}</span>`:''}</div>
        ${it.m?`<div class="item-meta">${it.m}</div>`:''}
      </div>
    `;
    secEl.appendChild(d);
  });
  list.appendChild(secEl);
});

document.getElementById('total').textContent = total;

function toggle(id, cb) {
  const item = document.querySelector(`.item[data-id="${id}"]`);
  if (cb.checked) {
    item.classList.add('checked');
    saved[id] = 1;
  } else {
    item.classList.remove('checked');
    delete saved[id];
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(saved).length;
  document.getElementById('done').textContent = done;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('fill').style.width = pct + '%';
  // section counts
  data.forEach((sec, si) => {
    let secDone = 0;
    sec.items.forEach((_, ii) => { if (saved[`${si}-${ii}`]) secDone++; });
    document.getElementById(`sc-${si}`).textContent = `${secDone}/${sec.items.length}`;
  });
}

function reset() {
  if (!confirm('清空所有打勾状态？')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function checkAll() {
  data.forEach((sec, si) => {
    sec.items.forEach((_, ii) => {
      saved[`${si}-${ii}`] = 1;
    });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  location.reload();
}

updateProgress();
</script>
