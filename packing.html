    --fam2: #db2777;  /* Peiyao/Kris 粉 */
    --fam2-soft: #fdf2f8;
    --shared: #059669; /* 共用 绿 */

    --p3: #dc2626;
    --p2: #d97706;
    --p1: #6b7280;

  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 12px;
    line-height: 1.5;
    font-size: 14px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    text-align: center;
  }
  .sub {
    text-align: center;
    color: var(--muted);
    margin-bottom: 12px;
    font-size: 12px;
  }
  .progress-bar {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 10px 0 8px;
    z-index: 10;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .fam-progress {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
  }
  .fam-prog-col {
    flex: 1;
    text-align: center;
  }
  .fam-prog-col .label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .fam-prog-col.f1 .label { color: var(--fam1); }
  .fam-prog-col.f2 .label { color: var(--fam2); }
  .fam-prog-col.fs .label { color: var(--shared); }
  .prog-track {
    height: 6px;
    background: #e8e4dd;
    border-radius: 3px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    transition: width 0.3s;
    width: 0%;
  }
  .fam-prog-col.f1 .prog-fill { background: var(--fam1); }
  .fam-prog-col.f2 .prog-fill { background: var(--fam2); }
  .fam-prog-col.fs .prog-fill { background: var(--shared); }
  .prog-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tab {
    flex-shrink: 0;
    padding: 6px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    white-space: nowrap;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .btn {
    flex: 1;
    padding: 7px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
  }
  .btn:active { background: #f4f1ec; }
  .section {
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    padding: 10px 14px;
    background: var(--accent-soft);
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-count {
    font-size: 11px;
    color: var(--muted);
    font-weight: normal;
  }

  /* 列标题 */
  .col-header {
    display: grid;
    grid-template-columns: 1fr 58px 58px;
    gap: 4px;
    padding: 6px 14px;
    background: #f8f5f0;
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    border-bottom: 1px solid #f4f1ec;

  .col-header .col-f1 { color: var(--fam1); text-align: center; }
  .col-header .col-f2 { color: var(--fam2); text-align: center; }

  .item {
    display: grid;
    grid-template-columns: 1fr 58px 58px;
    gap: 4px;
    padding: 9px 14px;
    border-bottom: 1px solid #f4f1ec;
    align-items: center;
  }
  .item:last-child { border-bottom: none; }
  .item-body { min-width: 0; }
  .item-name {
    font-weight: 500;
    font-size: 13.5px;
  }
  .item-name.done { text-decoration: line-through; color: var(--checked); }
  .item-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .pri {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
    color: #fff;
  }
  .p3 { background: var(--p3); }
  .p2 { background: var(--p2); }
  .p1 { background: var(--p1); }
  .qty {
    display: inline-block;
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #f4f1ec;
    color: #6b7280;
    margin-left: 4px;
  }
  /* 单元格 */
  .cell {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .cell input[type="checkbox"] {
    width: 22px;
    height: 22px;
    cursor: pointer;
  }
  .cell.f1 input { accent-color: var(--fam1); }
  .cell.f2 input { accent-color: var(--fam2); }
  .cell.shared {
    grid-column: 2 / 4;

  .cell.shared input { accent-color: var(--shared); }
  .cell.shared-label {
    grid-column: 2 / 4;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--shared);
    font-weight: 600;
  }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 20px 0;
    line-height: 1.8;
  }
  .legend-inline {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    color: #fff;
    margin: 0 2px;
  }
</style>

      {n:"重要药品",q:"每家1份",m:"长期服药必随身",p:3,type:"person"},
      {n:"备用眼镜",q:"按需",m:"",p:2,type:"person"},
      {n:"笔",q:"2支",m:"填海关申报",p:2,type:"shared"},
    ]
  },
];

const list = document.getElementById('list');
const STORAGE_KEY = 'italy_pack_v2';
let saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

let total1 = 0, total2 = 0, totalS = 0;

data.forEach((sec, si) => {
  const secEl = document.createElement('div');
  secEl.className = 'section';
  const secTitle = document.createElement('div');
  secTitle.className = 'section-title';
  secTitle.innerHTML = `<span>${sec.title}</span><span class="section-count" id="sc-${si}"></span>`;
  secEl.appendChild(secTitle);

  // 列标题
  const colH = document.createElement('div');
  colH.className = 'col-header';
  colH.innerHTML = `<div>物品</div><div class="col-f1">Neo/An</div><div class="col-f2">PY/Kris</div>`;
  secEl.appendChild(colH);

  sec.items.forEach((it, ii) => {
    const id = `${si}-${ii}`;
    const d = document.createElement('div');
    d.className = 'item';
    d.dataset.id = id;
    d.dataset.type = it.type;
    const pLabel = it.p===3?'必带':it.p===2?'建议':'可选';
    let cellsHTML = '';
    if (it.type === 'person') {
      total1++; total2++;
      const c1 = saved[`${id}-f1`] ? 'checked' : '';
      const c2 = saved[`${id}-f2`] ? 'checked' : '';
      cellsHTML = `
        <div class="cell f1"><input type="checkbox" ${c1} onchange="toggle('${id}','f1',this)"></div>
        <div class="cell f2"><input type="checkbox" ${c2} onchange="toggle('${id}','f2',this)"></div>
      `;
    } else {
      totalS++;
      const cs = saved[`${id}-s`] ? 'checked' : '';
      cellsHTML = `
        <div class="cell shared-label">🤝<input type="checkbox" ${cs} onchange="toggle('${id}','s',this)"></div>
      `;
    }
    d.innerHTML = `
      <div class="item-body">
        <div class="item-name">${it.n}<span class="pri p${it.p}">${pLabel}</span>${it.q?`<span class="qty">${it.q}</span>`:''}</div>
        ${it.m?`<div class="item-meta">${it.m}</div>`:''}
      </div>
      ${cellsHTML}
    `;
    secEl.appendChild(d);
  });
  list.appendChild(secEl);
});

document.getElementById('total1').textContent = total1;
document.getElementById('total2').textContent = total2;
document.getElementById('totalS').textContent = totalS;

function toggle(id, col, cb) {
  const key = `${id}-${col}`;
  if (cb.checked) saved[key] = 1; else delete saved[key];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  updateItem(id);
  updateProgress();
}

function updateItem(id) {
  const item = document.querySelector(`.item[data-id="${id}"]`);
  if (!item) return;
  const nameEl = item.querySelector('.item-name');
  let allDone;
  if (item.dataset.type === 'person') {
    allDone = saved[`${id}-f1`] && saved[`${id}-f2`];
  } else {
    allDone = saved[`${id}-s`];
  }
  nameEl.classList.toggle('done', !!allDone);
}

function updateProgress() {
  let d1=0, d2=0, dS=0;
  data.forEach((sec, si) => {
    sec.items.forEach((it, ii) => {
      const id = `${si}-${ii}`;
      if (it.type === 'person') {
        if (saved[`${id}-f1`]) d1++;
        if (saved[`${id}-f2`]) d2++;
      } else {
        if (saved[`${id}-s`]) dS++;
      }
      updateItem(id);
    });
    // section count
    let secTotal = sec.items.length, secDone = 0;
    sec.items.forEach((it, ii) => {
      const id = `${si}-${ii}`;
      if (it.type === 'person') {
        if (saved[`${id}-f1`] && saved[`${id}-f2`]) secDone++;
      } else {
        if (saved[`${id}-s`]) secDone++;
      }
    });
    document.getElementById(`sc-${si}`).textContent = `${secDone}/${secTotal}`;
  });
  document.getElementById('done1').textContent = d1;
  document.getElementById('done2').textContent = d2;
  document.getElementById('doneS').textContent = dS;
  document.getElementById('fill1').style.width = (total1?d1/total1*100:0) + '%';
  document.getElementById('fill2').style.width = (total2?d2/total2*100:0) + '%';
  document.getElementById('fillS').style.width = (totalS?dS/totalS*100:0) + '%';
}

function reset() {
  if (!confirm('清空所有打勾状态？')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function checkColumn(col) {
  data.forEach((sec, si) => {
    sec.items.forEach((it, ii) => {
      if (it.type === 'person') {
        saved[`${si}-${ii}-${col}`] = 1;
      }
    });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  location.reload();
}

// 过滤 tab
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const f = tab.dataset.filter;
    document.querySelectorAll('.item').forEach(item => {
      const type = item.dataset.type;
      if (f === 'all') {
        item.style.display = '';
      } else if (f === 'shared') {
        item.style.display = type === 'shared' ? '' : 'none';
      } else {
        item.style.display = type === 'person' ? '' : 'none';
      }
    });
    // 同时控制 section 显示
    document.querySelectorAll('.section').forEach(sec => {
      const visible = Array.from(sec.querySelectorAll('.item')).some(i => i.style.display !== 'none');
      sec.style.display = visible ? '' : 'none';
    });
  });
});

updateProgress();
</script>
</body>
</html>
